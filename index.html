<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">kataiy-store | ร้านเติมเกม</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { pastelBg: '#FFF0F5', pastelMain: '#FFB6C1', pastelDark: '#FF69B4', pastelBtn: '#FF8DA1' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #FFF0F5; color: #4A4A4A; overflow-x: hidden; }
        .smooth { transition: all 0.3s ease; }
        
        /* Marquee Animation */
        .marquee-box { overflow: hidden; white-space: nowrap; background: #FFB6C1; color: white; padding: 6px; font-size: 0.9rem; }
        .marquee-content { display: inline-block; animation: marquee-scroll 20s linear infinite; }
        @keyframes marquee-scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        
        /* SPA Routing Animation */
        .spa-page { display: none; animation: fadeIn 0.4s ease-out; }
        .spa-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Image Slider (สลับทุก 5 วิ) */
        .product-slider { position: relative; width: 100%; height: 160px; overflow: hidden; border-radius: 12px 12px 0 0; background: #fff; }
        .slider-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .slider-img.active { opacity: 1; }
        
        /* Forms & Buttons */
        .input-cute { border: 2px solid #FFB6C1; border-radius: 12px; padding: 12px; width: 100%; outline: none; background: #FFF; transition: border-color 0.3s; }
        .input-cute:focus { border-color: #FF69B4; box-shadow: 0 0 5px rgba(255,105,180,0.3); }
        .btn-cute { background: #FF8DA1; color: white; border-radius: 999px; padding: 12px 24px; font-weight: 600; cursor: pointer; transition: background 0.3s; width: 100%; text-align: center; display: block;}
        .btn-cute:hover { background: #FF69B4; }
        .admin-table th, .admin-table td { border-bottom: 1px solid #FFB6C1; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b-4 border-pastelMain">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
                <img id="uiLogo" src="https://img2.pic.in.th/-242_20260207172619.jpg" class="w-12 h-12 rounded-full border-2 border-pastelMain object-cover">
                <h1 id="uiName" class="text-xl md:text-2xl font-bold text-pastelDark">kataiy-store</h1>
            </div>
            
            <div class="flex items-center gap-3 md:gap-5">
                <select id="langSelect" onchange="changeLang()" class="text-sm bg-pastelBg border-pastelMain border rounded-full px-3 py-1 outline-none text-pastelDark font-semibold cursor-pointer hidden md:block">
                    <option value="th">ไทย</option><option value="en">English</option><option value="la">ລາວ</option>
                </select>
                
                <div id="uiUserBadge" class="hidden font-semibold text-pastelDark text-sm bg-pastelBg px-4 py-1.5 rounded-full border border-pastelMain cursor-pointer shadow-sm hover:bg-pastelMain hover:text-white smooth" onclick="navigate('inbox')">
                    <i class="fa-solid fa-user"></i> <span id="uId"></span> | <i class="fa-solid fa-coins"></i> <span id="uBal"></span>
                </div>
                
                <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="text-pastelMain text-2xl hover:text-pastelDark smooth">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="mobileMenu" class="hidden fixed right-4 top-20 w-64 bg-white rounded-3xl shadow-2xl z-50 overflow-hidden border-2 border-pastelMain divide-y divide-pastelBg">
        <button onclick="navigate('home')" class="w-full text-left px-5 py-4 hover:bg-pastelBg smooth text-pastelDark font-semibold"><i class="fa-solid fa-house w-6 text-center"></i> <span data-lang="mHome">หน้าหลัก</span></button>
        <button onclick="navigate('games')" class="w-full text-left px-5 py-4 hover:bg-pastelBg smooth text-pastelDark font-semibold"><i class="fa-solid fa-gamepad w-6 text-center"></i> <span data-lang="mGames">เกมทั้งหมด</span></button>
        <button onclick="navigate('topup')" class="w-full text-left px-5 py-4 hover:bg-pastelBg smooth text-pastelDark font-semibold"><i class="fa-solid fa-wallet w-6 text-center"></i> <span data-lang="mTopup">เติมเงิน</span></button>
        <button onclick="navigate('inbox')" class="w-full text-left px-5 py-4 hover:bg-pastelBg smooth text-pastelDark font-semibold"><i class="fa-solid fa-envelope w-6 text-center"></i> <span data-lang="mInbox">กล่องข้อความ</span></button>
        <button onclick="navigate('history')" class="w-full text-left px-5 py-4 hover:bg-pastelBg smooth text-pastelDark font-semibold"><i class="fa-solid fa-clock-rotate-left w-6 text-center"></i> <span data-lang="mHistory">ประวัติการสั่งซื้อ</span></button>
        <div id="menuAuthArea">
            <button onclick="navigate('auth')" class="w-full text-left px-5 py-4 hover:bg-pastelBg smooth text-pastelMain font-bold"><i class="fa-solid fa-arrow-right-to-bracket w-6 text-center"></i> <span data-lang="mLogin">เข้าสู่ระบบ / สมัครสมาชิก</span></button>

    <div class="marquee-box shadow-inner">

            <div class="flex flex-col md:flex-row justify-between items-center mb-6 border-b-2 border-pastelMain pb-3 gap-3">

                    <button id="btnTrue" class="flex-1 py-2 rounded-xl bg-transparent text-gray-500 font-bold hover:bg-white smooth" onclick="setPayMethod('true')"><i class="fa-solid fa-wallet"></i> ทรูมันนี่</button>
                    <button id="btnInter" class="flex-1 py-2 rounded-xl bg-transparent text-gray-500 font-bold hover:bg-white smooth" onclick="setPayMethod('inter')"><i class="fa-solid fa-globe"></i> ต่างประเทศ</button>
                </div>
                
                <div class="text-center mb-6">
                    <img id="qrDisplay" src="" class="mx-auto w-48 h-48 rounded-2xl border-2 border-pastelMain p-2 bg-white object-contain shadow-sm mb-2">

                <label class="block text-center mb-6 cursor-pointer bg-pastelBg border-2 border-dashed border-pastelMain p-6 rounded-2xl hover:bg-pink-50 smooth">

            </div>
        </section>

        <section id="page-inbox" class="spa-page">

            <div class="flex gap-2 overflow-x-auto pb-2 mb-6 hide-scrollbar">

                    <div><label class="text-xs font-bold text-gray-500">โลโก้ (URL)</label><input type="text" id="sLogo" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">แบนเนอร์ (URL)</label><input type="text" id="sBan" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">ข้อความ Popup</label><input type="text" id="sPopT" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">QR ธนาคาร (URL)</label><input type="text" id="sQr1" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">QR วอเลท (URL)</label><input type="text" id="sQr2" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">QR ต่างประเทศ</label><input type="text" id="sQr3" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">ข้อความรับยอด</label><input type="text" id="sMsg" class="input-cute !border-gray-300 !py-2"></div>
                    <div><label class="text-xs font-bold text-gray-500">สถานะร้าน</label><select id="sOp" class="input-cute !border-gray-300 !py-2"><option value="true">เปิด</option><option value="false">ปิด</option></select></div>

            <div id="adm-prod" class="bg-white p-6 rounded-2xl shadow border border-red-200 ad-sec hidden">

                    <input type="text" id="pAmt" placeholder="จำนวน/หน่วย" class="input-cute !border-gray-300 !py-2">
                    <input type="number" id="pPrice" placeholder="ราคา" class="input-cute !border-gray-300 !py-2">
                    <input type="text" id="pImg" placeholder="รูป (คั่นด้วย ,)" class="col-span-2 md:col-span-4 input-cute !border-gray-300 !py-2">
                </div>

            </div>

            <div id="adm-order" class="bg-white p-4 rounded-2xl shadow border border-red-200 ad-sec hidden">

            </div>

    <footer class="bg-white border-t-4 border-pastelMain mt-10 p-6 text-center text-pastelDark font-semibold">
        <p><i class="fa-solid fa-copyright"></i> 2026 <span id="fName">kataiy-store</span>. All rights reserved.</p>
        <p id="fContact" class="mt-2 text-sm text-gray-500"></p>
    </footer>

    <script>
        // ⚠️ สำคัญ: นำ Web App URL ที่ได้จาก Apps Script มาใส่ตรงนี้
        const API_URL = 'https://script.google.com/macros/s/AKfycbxXYEwOAYFjx5DA4tDshg_N0vEdwr8gd9keNTOWfaCyTiY_7JkUzC_9qehsL60Hg36l0g/exec';
        
        let appState = { sys:{}, prods:[], user:null, inbox:[], uOrders:[], admin:null, isBusy:false, pay:'bank', lang:'th' };
        
        const dict = {
            th: { mHome:'หน้าหลัก', mGames:'เกมทั้งหมด', mTopup:'เติมเงิน', mInbox:'กล่องข้อความ', mHistory:'ประวัติ', mLogin:'เข้าสู่ระบบ' },
            en: { mHome:'Home', mGames:'All Games', mTopup:'Topup', mInbox:'Inbox', mHistory:'History', mLogin:'Login' },
            la: { mHome:'ໜ້າຫຼັກ', mGames:'ເກມທັງໝົດ', mTopup:'ຕື່ມເງິນ', mInbox:'ກ່ອງຂໍ້ຄວາມ', mHistory:'ປະຫວັດ', mLogin:'ເຂົ້າສູ່ລະບົບ' }
        };

        window.onload = () => {
            appState.user = JSON.parse(localStorage.getItem('ks_user'));
            fetchData();
            
            // อัปเดตเงียบๆ ทุก 3 วินาที (Polling)
            setInterval(() => fetchData(true), 3000);
            
            // สลับรูปภาพทุกๆ 5 วินาที
            setInterval(() => {
                document.querySelectorAll('.product-slider').forEach(s => {
                    let imgs = s.querySelectorAll('.slider-img');
                    if(imgs.length > 1) {
                        let active = Array.from(imgs).findIndex(i => i.classList.contains('active'));
                        imgs[active].classList.remove('active');
                        imgs[(active + 1) % imgs.length].classList.add('active');
                    }
                });
            }, 5000);
        };

        async function fetchAPI(action, payload) {
            if(appState.isBusy) return null;
            appState.isBusy = true;
            try {
                let r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({action, payload}) });
                let d = await r.json(); appState.isBusy = false; return d;
            } catch(e) { appState.isBusy = false; return null; }
        }

        async function fetchData(silent = false) {
            appState.isBusy = false; // Bypass lock for background polling
            let res = await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'getData', payload:{userId: appState.user?.userId}}) }).then(r=>r.json()).catch(()=>null);
            
            if(res && res.status === 'success') {
                appState.sys = res.settings; appState.prods = res.products;
                if(res.user) {
                    appState.user = res.user; localStorage.setItem('ks_user', JSON.stringify(res.user));
                    appState.inbox = res.inbox; appState.uOrders = res.userOrders;
                }
                if(res.adminData) appState.admin = res.adminData;
                updateUI(silent);
            }
        }

        function updateUI(silent) {
            document.title = appState.sys.storeName;
            document.getElementById('uiName').innerText = appState.sys.storeName;
            document.getElementById('fName').innerText = appState.sys.storeName;
            document.getElementById('uiLogo').src = appState.sys.logo;
            document.getElementById('fContact').innerHTML = `<i class="fa-solid fa-headset"></i> ` + (appState.sys.contact || '');
            
            if(appState.sys.banner) {
                document.getElementById('uiBanner').src = appState.sys.banner;
                document.getElementById('uiBanner').classList.remove('hidden');
            }

            let an = appState.sys.announcement || '';
            let hist = appState.history ? appState.history.join(' &nbsp;|&nbsp; ') : '';
            document.getElementById('uiMarquee').innerHTML = `<i class="fa-solid fa-bullhorn"></i> ${an} &nbsp;&nbsp;|&nbsp;&nbsp; <i class="fa-solid fa-clock-rotate-left"></i> ${hist}`;

            let st = document.getElementById('uiStatus');
            st.style.display = 'block';
            if(appState.sys.isOpen === 'true') {
                st.className = 'max-w-7xl mx-auto mt-4 mx-4 p-3 rounded-2xl text-center font-bold text-pastelDark bg-white border-2 border-pastelMain shadow-sm';
                st.innerHTML = `<i class="fa-solid fa-door-open"></i> ร้านเปิดให้บริการตามปกติค่ะ`;
            } else {
                st.className = 'max-w-7xl mx-auto mt-4 mx-4 p-3 rounded-2xl text-center font-bold text-white bg-red-400 shadow-sm';
                st.innerHTML = `<i class="fa-solid fa-door-closed"></i> ขออภัยค่ะ ขณะนี้ร้านปิดให้บริการ`;
            }

            if(!appState.user) {
                document.getElementById('homeTitle').innerText = 'บริการแนะนำ (กรุณาเข้าสู่ระบบ)';
                document.getElementById('uiUserBadge').classList.add('hidden');
            } else {
                document.getElementById('homeTitle').innerText = 'บริการทั้งหมด';
                document.getElementById('uiUserBadge').classList.remove('hidden');
                document.getElementById('uId').innerText = appState.user.userId;
                document.getElementById('uBal').innerText = appState.user.balance.toFixed(2);
                document.getElementById('menuAuthArea').innerHTML = `<button onclick="logout()" class="w-full text-left px-5 py-4 hover:bg-red-50 smooth text-red-500 font-bold"><i class="fa-solid fa-right-from-bracket w-6 text-center"></i> ออกจากระบบ</button>`;
                if(appState.user.role === 'admin') {
                    document.getElementById('page-admin').classList.remove('hidden');
                    if(document.getElementById('page-admin').classList.contains('active')) renderAdmin();
                }
            }

            extractCats();
            if(!silent || document.getElementById('gridProducts').innerHTML.includes('กำลังโหลด')) renderProds();
            renderUserInboxHistory();

            // Popup ตอนเปิดเว็บ
            if(!silent && appState.sys.popupImg && !sessionStorage.getItem('popSeen')) {
                Swal.fire({ imageUrl: appState.sys.popupImg, text: appState.sys.popupText, imageWidth: '100%', confirmButtonColor: '#FFB6C1', customClass: { popup: 'rounded-3xl' } });
                sessionStorage.setItem('popSeen', 'true');
            }
        }

        function navigate(page) {
            if(page === 'games') page = 'home'; // ให้ใช้หน้าเดียวกัน
            document.querySelectorAll('.spa-page').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById('mobileMenu').classList.add('hidden');
            window.scrollTo(0,0);
        }

        function changeLang() {
            let l = document.getElementById('langSelect').value;
            appState.lang = l;
            document.querySelectorAll('[data-lang]').forEach(el => {
                let k = el.getAttribute('data-lang');
                if(dict[l] && dict[l][k]) el.innerText = dict[l][k];
            });
        }

        function extractCats() {
            let sel = document.getElementById('catFilter');
            let v = sel.value;
            let cats = [...new Set(appState.prods.map(p => p.category))];
            sel.innerHTML = '<option value="all">หมวดหมู่ทั้งหมด</option>';
            cats.sort().forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            sel.value = v;
        }

        function renderProds() {
            let grid = document.getElementById('gridProducts');
            let f = document.getElementById('catFilter').value;
            let arr = appState.prods.filter(p => f === 'all' || p.category === f);
            arr.sort((a,b) => a.price - b.price); // เรียงราคาจากน้อยไปมาก

            if(arr.length === 0) return grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">ไม่พบสินค้าค่ะ</div>';

            let html = '';
            arr.forEach(p => {
                let imgs = p.images.split(',').map(i=>i.trim());
                let imgTags = imgs.map((m,i)=> `<img src="${m}" class="slider-img ${i===0?'active':''}">`).join('');
                
                html += `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-md border-2 border-transparent hover:border-pastelMain cursor-pointer smooth flex flex-col" onclick="buyProd('${p.id}', '${p.name}', ${p.price})">
                    <div class="product-slider">${imgTags}</div>
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-xs bg-pastelBg text-pastelDark px-2 py-1 rounded-full font-semibold">${p.category}</span>
                            <h3 class="font-bold text-gray-800 mt-2 leading-tight">${p.name}</h3>
                            <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-gem"></i> ${p.amount}</p>
                        </div>
                        <div class="mt-3 text-right"><span class="text-pastelDark font-bold text-lg">฿${p.price.toFixed(2)}</span></div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // Logic ซื้อสินค้า (เลือก Login Type ได้)
        function buyProd(id, name, price) {
            if(!appState.user) return navigate('auth');
            if(appState.sys.isOpen !== 'true') return Swal.fire('ปิดร้าน', 'ขออภัยค่ะ ร้านปิดให้บริการชั่วคราว', 'warning');

            Swal.fire({
                title: 'ยืนยันสั่งซื้อ',
                html: `<div class="text-left bg-pastelBg p-4 rounded-xl mb-4 text-sm font-semibold">
                        <p>สินค้า: <span class="text-pastelDark">${name}</span></p>
                        <p>ราคา: <span class="text-pastelDark">${price.toFixed(2)} บาท</span></p>
                       </div>
                       <select id="lType" class="input-cute mb-2 !py-2" onchange="toggleBuyInput()"><option value="uid">กรอก UID</option><option value="mail">Mail / Password</option></select>
                       <div id="buyInputArea"><input type="text" id="gUid" class="input-cute !text-center" placeholder="กรอก UID เกมของคุณ"></div>`,
                showCancelButton: true, confirmButtonText: 'สั่งซื้อเลย', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#FFB6C1', customClass: { popup: 'rounded-3xl' }
            }).then(async (res) => {
                if (res.isConfirmed) {
                    let type = document.getElementById('lType').value;
                    let data = type === 'uid' ? document.getElementById('gUid').value : `ID:${document.getElementById('gMail').value} P:${document.getElementById('gPass').value}`;
                    
                    if(!data || data.includes('undefined')) return Swal.fire('ผิดพลาด', 'กรุณากรอกข้อมูลตัวละครให้ครบค่ะ', 'error');
                    
                    Swal.fire({ title: 'กำลังสั่งซื้อ...', didOpen: () => Swal.showLoading() });
                    let apiRes = await fetchAPI('order', { userId: appState.user.userId, product: name, price: price, loginType: type, gameData: data });
                    
                    if(apiRes && apiRes.status === 'success') {
                        Swal.fire({ icon: 'success', title: 'สำเร็จ', text: appState.sys.orderSuccessMsg, confirmButtonColor: '#FFB6C1' });
                        fetchData(); 
                    } else { Swal.fire('ผิดพลาด', apiRes ? apiRes.message : 'ยอดเงินไม่เพียงพอ', 'error'); }
                }
            });
        }

        // ทำให้ Form เปลี่ยนตาม Select
        window.toggleBuyInput = () => {
            let t = document.getElementById('lType').value;
            document.getElementById('buyInputArea').innerHTML = t === 'uid' ? `<input type="text" id="gUid" class="input-cute !text-center" placeholder="กรอก UID">` : `<input type="text" id="gMail" class="input-cute mb-2 !text-center" placeholder="ID หรือ Mail"><input type="text" id="gPass" class="input-cute !text-center" placeholder="Password">`;
        };

        // Topup
        function setPayMethod(m) {
            appState.pay = m;
            ['Bank','True','Inter'].forEach(x => {
                document.getElementById(`btn${x}`).className = m === x.toLowerCase() ? 'flex-1 py-2 rounded-xl bg-pastelDark text-white font-bold shadow smooth' : 'flex-1 py-2 rounded-xl bg-transparent text-gray-500 font-bold hover:bg-white smooth';
            });
            document.getElementById('qrDisplay').src = m === 'bank' ? appState.sys.qrBank : m === 'true' ? appState.sys.qrTrue : appState.sys.qrInter;
        }

        function submitTopup() {
            if(!appState.user) return navigate('auth');
            let amt = document.getElementById('tAmt').value;
            let time = document.getElementById('tTime').value;
            let ref = document.getElementById('tRef').value.toUpperCase();
            let file = document.getElementById('tFile').files[0];

            if(!/^[A-Z0-9]{6}$/.test(ref)) return Swal.fire('ผิดพลาด', 'รหัสอ้างอิงต้องเป็น 6 ตัวท้ายเท่านั้นค่ะ', 'error');
            if(!amt || !time || !file) return Swal.fire('ผิดพลาด', 'กรุณากรอกข้อมูลและแนบสลิปค่ะ', 'error');

            let reader = new FileReader();
            reader.onload = async () => {
                Swal.fire({ title: 'กำลังอัปโหลด...', didOpen: () => Swal.showLoading() });
                let res = await fetchAPI('topup', { userId: appState.user.userId, amount: amt, time: time, refCode: ref, imageBase64: reader.result, method: appState.pay });
                if(res && res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'แจ้งโอนสำเร็จ', text: 'แอดมินรับยอดค่ะ รอยอดเข้า 5-10 นาทีนะคะ', confirmButtonColor: '#FFB6C1' });
                    document.getElementById('tAmt').value=''; document.getElementById('tRef').value=''; document.getElementById('tTime').value='';
                } else Swal.fire('ผิดพลาด', res ? res.message : 'เกิดข้อผิดพลาด', 'error');
            };
            reader.readAsDataURL(file);
        }

        function switchAuth(t) {
            document.getElementById('formLogin').classList.toggle('hidden', t !== 'login');
            document.getElementById('formReg').classList.toggle('hidden', t !== 'reg');
            document.getElementById('authTitle').innerText = t === 'login' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
        }

        async function handleAuth(t) {
            Swal.fire({ title: 'รอสักครู่...', didOpen: () => Swal.showLoading() });
            let p = {};
            if(t === 'login') {
                p = { idOrEmail: document.getElementById('logUser').value, password: document.getElementById('logPass').value };
                if(!p.idOrEmail || !p.password) return Swal.fire('แจ้งเตือน', 'กรุณากรอกให้ครบ', 'warning');
            } else {
                p = { email: document.getElementById('regMail').value, password: document.getElementById('regPass').value };
                if(p.password !== document.getElementById('regPass2').value) return Swal.fire('ผิดพลาด', 'รหัสไม่ตรงกัน', 'error');
            }
            let res = await fetchAPI(t, p);
            if(res && res.status === 'success') {
                appState.user = res.user; localStorage.setItem('ks_user', JSON.stringify(res.user));
                Swal.fire({ icon:'success', title:'สำเร็จ', timer:1500, showConfirmButton:false });
                fetchData(); navigate('home');
            } else Swal.fire('ผิดพลาด', res?res.message:'ระบบขัดข้อง', 'error');
        }

        function logout() { localStorage.removeItem('ks_user'); location.reload(); }

        function renderUserInboxHistory() {
            let cx = document.getElementById('inboxList');
            if(!appState.user) return cx.innerHTML = '<div class="text-center py-10 text-gray-400">กรุณาเข้าสู่ระบบค่ะ</div>';
            
            cx.innerHTML = appState.inbox.length === 0 ? '<div class="text-center py-5">ไม่มีข้อความค่ะ</div>' : appState.inbox.map(m => `<div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-pastelMain"><p class="text-xs text-gray-400 mb-1"><i class="fa-solid fa-clock"></i> ${new Date(m.time).toLocaleString('th-TH')}</p><p class="font-semibold text-pastelDark">${m.msg}</p></div>`).join('');
            
            let tx = document.getElementById('tbl-user-history');
            tx.innerHTML = '<tr><th>เวลา</th><th>Order</th><th>สินค้า</th><th>สถานะ</th></tr>' + appState.uOrders.map(o => `<tr><td>${new Date(o.time).toLocaleString('th-TH')}</td><td>${o.oid}</td><td>${o.prod}</td><td>${o.stat==='Pending'?'<span class="text-yellow-500">รอดำเนินการ</span>':'<span class="text-green-500">สำเร็จ</span>'}</td></tr>`).join('');
        }

        // --- ADMIN DASHBOARD ---
        function swAdTab(t) {
            document.querySelectorAll('.ad-sec').forEach(el => el.classList.add('hidden'));
            document.getElementById(`adm-${t}`).classList.remove('hidden');
            let btns = document.querySelectorAll('#page-admin button[onclick^="swAdTab"]');
            btns.forEach(b => { b.className = 'bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-bold whitespace-nowrap hover:bg-red-50'; });
            event.target.className = 'bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold whitespace-nowrap';
        }

        function renderAdmin() {
            if(!appState.admin) return;
            document.getElementById('sName').value = appState.sys.storeName||'';
            document.getElementById('sLogo').value = appState.sys.logo||'';
            document.getElementById('sBan').value = appState.sys.banner||'';
            document.getElementById('sPopT').value = appState.sys.popupText||'';
            document.getElementById('sQr1').value = appState.sys.qrBank||'';
            document.getElementById('sQr2').value = appState.sys.qrTrue||'';
            document.getElementById('sQr3').value = appState.sys.qrInter||'';
            document.getElementById('sMsg').value = appState.sys.orderSuccessMsg||'';
            document.getElementById('sOp').value = appState.sys.isOpen||'true';

            document.getElementById('tb-prods').innerHTML = '<tr><th>ID</th><th>หมวด</th><th>ชื่อ</th><th>ราคา</th><th>ลบ</th></tr>' + appState.prods.map(p => `<tr><td>${p.id}</td><td>${p.category}</td><td>${p.name}</td><td>฿${p.price}</td><td><button onclick="delP('${p.id}')" class="text-red-500"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('');
            
            document.getElementById('tb-topups').innerHTML = '<tr><th>เวลา</th><th>User</th><th>ยอด</th><th>อ้างอิง</th><th>สลิป</th><th>สถานะ</th></tr>' + appState.admin.topups.map(t => `<tr><td>${new Date(t.time).toLocaleString('th-TH')}</td><td>${t.uid}</td><td>${t.amt}</td><td>${t.ref}</td><td><a href="${t.img}" target="_blank" class="text-blue-500 underline">ดู</a></td><td>${t.stat==='Pending'?`<button onclick="upd('topup','${t.tid}','${t.uid}',${t.amt})" class="bg-green-500 text-white px-2 py-1 rounded">อนุมัติ</button>`:'<span class="text-green-500">สำเร็จ</span>'}</td></tr>`).join('');
            
            document.getElementById('tb-orders').innerHTML = '<tr><th>เวลา</th><th>Order</th><th>User</th><th>สินค้า</th><th>ข้อมูล</th><th>สถานะ</th></tr>' + appState.admin.orders.map(o => `<tr><td>${new Date(o.time).toLocaleString('th-TH')}</td><td>${o.oid}</td><td>${o.uid}</td><td>${o.prod}</td><td><span class="bg-gray-100 p-1 rounded">${o.data}</span></td><td>${o.stat==='Pending'?`<button onclick="upd('order','${o.oid}','${o.uid}',0)" class="bg-green-500 text-white px-2 py-1 rounded">เสร็จสิ้น</button>`:'<span class="text-green-500">สำเร็จ</span>'}</td></tr>`).join('');
        }

        async function saveSet() {
            let p = {
                storeName: document.getElementById('sName').value, logo: document.getElementById('sLogo').value,
                banner: document.getElementById('sBan').value, popupText: document.getElementById('sPopT').value,
                qrBank: document.getElementById('sQr1').value, qrTrue: document.getElementById('sQr2').value,
                qrInter: document.getElementById('sQr3').value, orderSuccessMsg: document.getElementById('sMsg').value,
                isOpen: document.getElementById('sOp').value
            };
            Swal.fire({ title:'บันทึก...', didOpen:()=>Swal.showLoading() });
            let res = await fetchAPI('adminSaveSet', p);
            if(res && res.status==='success') { Swal.fire('สำเร็จ','','success'); fetchData(); }
        }

        async function addProd() {
            let p = {
                category: document.getElementById('pCat').value, name: document.getElementById('pName').value,
                amount: document.getElementById('pAmt').value, price: document.getElementById('pPrice').value,
                images: document.getElementById('pImg').value, details: ''
            };
            if(!p.name || !p.price) return alert('กรอกไม่ครบ');
            Swal.fire({ title:'เพิ่ม...', didOpen:()=>Swal.showLoading() });
            let res = await fetchAPI('adminAddProd', p);
            if(res && res.status==='success') { Swal.fire('สำเร็จ','','success'); fetchData(); }
        }

        async function delP(id) {
            if(!confirm('ลบ?')) return;
            let res = await fetchAPI('adminDelProd', {id: id});
            if(res && res.status==='success') fetchData();
        }

        async function upd(t, id, uid, amt) {
            Swal.fire({ title:'รอสักครู่...', didOpen:()=>Swal.showLoading() });
            let res = await fetchAPI('adminUpdateStatus', {type:t, id:id, uid:uid, amount:amt});
            if(res && res.status==='success') { Swal.fire('สำเร็จ','','success'); fetchData(); }
        }
    </script>
</body>
</html>
